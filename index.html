<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cassa Pro - Scanner & Bilancia</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #0056b3; --secondary: #28a745; --danger: #dc3545; --warning: #ff9800; --bg: #cfd8dc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* LATO SINISTRO: VENDITA */
        #inventory-side { flex: 7; display: flex; flex-direction: column; padding: 10px; border-right: 2px solid #999; height: 100vh; }
        #scanner-container { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 10px; position: relative; min-height: 180px; border: 3px solid #555; }
        #reader { width: 100% !important; }

        .qty-bar { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-qty { flex: 1; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; background: #546e7a; color: white; }
        #qty-display { font-size: 25px; font-weight: bold; min-width: 40px; text-align: center; color: var(--primary); }

        .nav-tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .tab { padding: 15px; background: #b0bec5; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }

        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; overflow-y: auto; flex-grow: 1; background: #eee; padding: 10px; border-radius: 10px; }
        .p-card { background: white; border: none; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border-bottom: 4px solid #90a4ae; min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .p-card:active { background: #e3f2fd; transform: scale(0.95); }
        .p-card .emoji { font-size: 35px; display: block; }
        .p-card .name { font-size: 10px; font-weight: bold; display: block; height: 24px; overflow: hidden; margin: 5px 0; line-height: 1; }
        .p-card .price { font-size: 12px; color: var(--primary); font-weight: bold; }

        /* LATO DESTRO: SCONTRINO */
        #receipt-side { flex: 3.5; background: #455a64; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        #paper { background: white; padding: 15px; font-family: 'Courier New', monospace; flex: 1; overflow-y: auto; border-radius: 5px; }
        .r-header { text-align: center; font-size: 11px; }
        .divider { border-top: 1px dashed #000; margin: 10px 0; }
        .r-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; }
        .r-sub { font-size: 10px; margin-bottom: 5px; padding-left: 10px; color: #555; }
        .r-total { font-size: 22px; font-weight: bold; display: flex; justify-content: space-between; border-top: 2px solid #000; padding-top: 10px; margin-top: 10px; }

        /* MODALI */
        .modal { display: none; position: fixed; z-index: 10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal-content input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 22px; text-align: center; }
        .btn { padding: 18px; border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
    </style>
</head>
<body>

    <!-- MODALE BILANCIA (PESO) -->
    <div id="modal-weight" class="modal">
        <div class="modal-content">
            <h2 id="weight-item-name">Prodotto a Peso</h2>
            <p>Inserisci il peso in <strong>Kg</strong> (es: 0.5 para 500g)</p>
            <input type="number" id="input-weight" step="0.001" placeholder="0.000 kg">
            <button class="btn" style="background:var(--secondary)" onclick="confermaPeso()">AGGIUNGI AL CARRELLO</button>
            <button class="btn" style="background:#777" onclick="chiudiModale('modal-weight')">ANNULLA</button>
        </div>
    </div>

    <!-- MODALE NUOVO PRODOTTO -->
    <div id="modal-new" class="modal">
        <div class="modal-content">
            <h3>📦 Nuovo Prodotto</h3>
            <p id="new-barcode-display">Codice: --</p>
            <input type="text" id="new-name" placeholder="Nome Prodotto">
            <input type="number" id="new-price" placeholder="Prezzo (€)">
            <div style="margin:10px 0; text-align:left; font-weight:bold;">
                <input type="checkbox" id="new-is-weight" style="width:20px; height:20px; vertical-align:middle;"> Vendita a peso (Kg)
            </div>
            <button class="btn" style="background:var(--primary)" onclick="salvaNuovo()">SALVA IN ARCHIVIO</button>
            <button class="btn" style="background:#777" onclick="chiudiModale('modal-new')">ANNULLA</button>
        </div>
    </div>

    <!-- MODALE PAGAMENTO -->
    <div id="modal-pay" class="modal">
        <div class="modal-content">
            <h2 id="pay-tot">Totale: 0.00 €</h2>
            <input type="number" id="pay-in" placeholder="Somma Ricevuta" oninput="calcolaResto()">
            <h1 id="pay-resto" style="color:var(--secondary)">Resto: 0.00 €</h1>
            <button class="btn" style="background:var(--secondary)" onclick="concludi()">CHIUDI SCONTRINO</button>
            <button class="btn" style="background:#777" onclick="chiudiModale('modal-pay')">ANNULLA</button>
        </div>
    </div>

    <!-- UI -->
    <div id="inventory-side">
        <div id="scanner-container">
            <div id="reader"></div>
            <button id="btn-cam" onclick="startScanner()" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); padding:15px; background:var(--secondary); color:white; border:none; border-radius:10px; font-weight:bold; z-index:10;">📷 ATTIVA SCANNER</button>
        </div>

        <div class="qty-bar">
            <div id="qty-display">1</div>
            <button class="btn-qty" onclick="setQ(1)">1</button>
            <button class="btn-qty" onclick="setQ(2)">2</button>
            <button class="btn-qty" onclick="setQ(5)">5</button>
            <button class="btn-qty" onclick="setQ(10)">10</button>
            <button class="btn-qty" style="background:var(--danger)" onclick="setQ(1)">C</button>
        </div>

        <div class="nav-tabs" id="tabs"></div>
        <div id="grid"></div>
    </div>

    <div id="receipt-side">
        <div id="paper">
            <div class="r-header">
                <strong>SUPERMERCATO SCANNER PRO</strong><br>
                REPARTO BILANCIA ATTIVO<br>
                <div id="out-date">--/--/-- --:--</div>
                <div>OP: CASSIERE 1</div>
            </div>
            <div class="divider"></div>
            <div id="st-items"></div>
            <div class="divider"></div>
            <div class="r-total">
                <span>TOTALE</span>
                <span id="st-total">0.00 €</span>
            </div>
        </div>
        <button class="btn" style="background:var(--secondary)" onclick="apriPay()">PAGA CONTANTI</button>
        <button class="btn" style="background:var(--warning)" onclick="alert('Simulazione Carta')">PAGA CARTA</button>
        <button class="btn" style="background:#222; font-size:10px;" onclick="resetDB()">RESET ARCHIVIO</button>
    </div>

    <script>
        // DATABASE INIZIALE (w: true significa a peso)
        const defP = [
            {n:"Pane Fresco", p:3.50, i:"🥖", c:"FRESCHI", b:"001", w:true},
            {n:"Mele Fuji", p:1.90, i:"🍎", c:"FRESCHI", b:"002", w:true},
            {n:"Bistecca", p:15.00, i:"🥩", c:"FRESCHI", b:"003", w:true},
            {n:"Pesce Spada", p:22.00, i:"🐟", c:"FRESCHI", b:"004", w:true},
            {n:"Pasta 500g", p:0.85, i:"🍝", c:"DISPENSA", b:"8076809513753", w:false},
            {n:"Coca Cola", p:1.80, i:"🥤", c:"BEVANDE", b:"5449000000996", w:false},
            {n:"Latte 1L", p:1.40, i:"🥛", c:"FRESCHI", b:"005", w:false},
            {n:"Uova x6", p:2.10, i:"🥚", c:"FRESCHI", b:"006", w:false},
            {n:"Rossetto", p:10.0, i:"💄", c:"MAKEUP", b:"007", w:false},
            {n:"T-Shirt", p:15.0, i:"👕", c:"VESTITI", b:"008", w:false}
        ];

        let prodotti = JSON.parse(localStorage.getItem('cassa_db')) || defP;
        let carrello = [], qta = 1, audioCtx = null, pendingItem = null, pendingBarcode = "";

        window.onload = function() {
            const cats = ['TUTTI', 'FRESCHI', 'DISPENSA', 'BEVANDE', 'MAKEUP', 'VESTITI'];
            document.getElementById('tabs').innerHTML = cats.map(c => `<button class="tab" onclick="filtra('${c}', this)">${c}</button>`).join('');
            document.getElementById('tabs').children[0].classList.add('active');
            filtra('TUTTI');
            setInterval(() => { document.getElementById('out-date').innerText = new Date().toLocaleString(); }, 1000);
        };

        function filtra(cat, btn) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            const lista = (cat === 'TUTTI') ? prodotti : prodotti.filter(p => p.c === cat);
            lista.forEach(p => {
                const b = document.createElement('button');
                b.className = "p-card";
                b.onclick = () => aggiungi(p.b);
                b.innerHTML = `<span class="emoji">${p.i || '📦'}</span><span class="name">${p.n}</span><span class="price">${p.p.toFixed(2)}€${p.w?'/kg':''}</span>`;
                grid.appendChild(b);
            });
            if(btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        function startScanner() {
            document.getElementById('btn-cam').style.display = 'none';
            const html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (b) => { aggiungi(b); });
        }

        function setQ(n) { qta = n; document.getElementById('qty-display').innerText = n; }

        function aggiungi(barcode) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const p = prodotti.find(item => item.b === barcode);
            
            if (p) {
                if (p.w) {
                    // PRODOTTO A PESO: APRI BILANCIA
                    pendingItem = p;
                    document.getElementById('weight-item-name').innerText = p.n;
                    document.getElementById('modal-weight').style.display = 'flex';
                    document.getElementById('input-weight').focus();
                } else {
                    // PRODOTTO A PEZZO
                    let es = carrello.find(i => i.b === barcode);
                    if(es) es.q += qta; else carrello.push({ ...p, q: qta });
                    beep(800, 0.08);
                    render();
                }
            } else {
                // NUOVO CODICE
                pendingBarcode = barcode;
                document.getElementById('new-barcode-display').innerText = "Codice: " + barcode;
                document.getElementById('modal-new').style.display = 'flex';
            }
            qta = 1; document.getElementById('qty-display').innerText = 1;
        }

        function confermaPeso() {
            const peso = parseFloat(document.getElementById('input-weight').value);
            if (peso > 0) {
                carrello.push({ ...pendingItem, q: peso });
                beep(800, 0.08);
                render();
                chiudiModale('modal-weight');
                document.getElementById('input-weight').value = "";
            }
        }

        function salvaNuovo() {
            const n = document.getElementById('new-name').value;
            const p = parseFloat(document.getElementById('new-price').value);
            const w = document.getElementById('new-is-weight').checked;
            if (n && p > 0) {
                const nuovo = { n: n, p: p, i: "📦", b: pendingBarcode, c: "TUTTI", w: w };
                prodotti.push(nuovo);
                localStorage.setItem('cassa_db', JSON.stringify(prodotti));
                chiudiModale('modal-new');
                filtra('TUTTI');
                aggiungi(pendingBarcode);
            }
        }

        function render() {
            const cont = document.getElementById('st-items');
            cont.innerHTML = ""; let tot = 0;
            carrello.forEach(i => {
                let sub = i.p * i.q; tot += sub;
                cont.innerHTML += `<div class="r-row"><span>${i.n}</span><span>${sub.toFixed(2)}€</span></div>
                <div class="r-sub">${i.w ? i.q.toFixed(3)+' kg x ' : i.q+' x '} ${i.p.toFixed(2)}</div>`;
            });
            document.getElementById('st-total').innerText = tot.toFixed(2) + " €";
        }

        function apriPay() {
            if(carrello.length === 0) return;
            document.getElementById('pay-tot').innerText = "Totale: " + document.getElementById('st-total').innerText;
            document.getElementById('modal-pay').style.display = 'flex';
        }

        function calcolaResto() {
            let tot = parseFloat(document.getElementById('st-total').innerText);
            let rice = parseFloat(document.getElementById('pay-in').value) || 0;
            document.getElementById('pay-resto').innerText = "Resto: " + (rice-tot > 0 ? (rice-tot).toFixed(2) : "0.00") + " €";
        }

        function concludi() { 
            alert("VENDITA CONCLUSA!"); 
            carrello = []; render(); 
            chiudiModale('modal-pay'); 
            document.getElementById('pay-in').value = ""; 
        }

        function chiudiModale(id) { document.getElementById(id).style.display = 'none'; }
        function resetDB() { if(confirm("Cancellare l'archivio?")) { localStorage.removeItem('cassa_db'); location.reload(); } }
        function beep(f, d) { if(audioCtx) { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.value = 0.05; o.start(); o.stop(audioCtx.currentTime + d); } }
    </script>
</body>
</html>
