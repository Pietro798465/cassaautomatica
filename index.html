<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cassa Supermercato Pro iPad</title>
    <style>
        :root {
            --primary: #0056b3; --secondary: #28a745; --danger: #dc3545; --warning: #ff9800; --bg: #cfd8dc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* MODALE INIZIO - COPRE TUTTO */
        #modal-start { position: fixed; z-index: 9999; left:0; top:0; width:100%; height:100%; background:#cfd8dc; display: flex; align-items: center; justify-content: center; }
        .box-setup { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .box-setup input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; }

        /* PANNELLI */
        #inventory-side { flex: 7; display: flex; flex-direction: column; padding: 10px; border-right: 2px solid #999; }
        #receipt-side { flex: 3.5; background: #455a64; padding: 15px; display: flex; flex-direction: column; }

        /* BOTTONI QUANTITA */
        .qty-bar { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .btn-qty { flex: 1; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; background: #546e7a; color: white; }
        #qty-display { font-size: 30px; font-weight: bold; padding: 0 15px; color: var(--primary); min-width: 50px; text-align: center; }

        /* TABS CATEGORIE */
        .nav-tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 15px 20px; background: #b0bec5; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; }

        /* GRIGLIA PRODOTTI */
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; overflow-y: auto; }
        .p-card { background: white; border: none; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border-bottom: 4px solid #90a4ae; }
        .p-card:active { background: #e3f2fd; }
        .p-card .emoji { font-size: 35px; display: block; }
        .p-card .name { font-size: 11px; font-weight: bold; display: block; height: 28px; overflow: hidden; margin: 5px 0; }

        /* SCONTRINO */
        #paper { background: white; padding: 15px; font-family: 'Courier New', monospace; flex: 1; overflow-y: auto; border-radius: 5px; }
        .r-header { text-align: center; font-size: 11px; }
        .divider { border-top: 1px dashed #000; margin: 10px 0; }
        .r-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .r-sub { font-size: 11px; margin-bottom: 8px; padding-left: 15px; }

        /* PULSANTI AZIONE */
        .btn { padding: 20px; border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-pay { background: var(--secondary); width: 100%; margin-top: 8px; }
        .btn-card { background: var(--warning); width: 100%; margin-top: 8px; }

        /* MODALI PAGAMENTO */
        .pay-modal { display: none; position: fixed; z-index: 10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .pay-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .v-card { padding: 20px; border-radius: 10px; color: white; font-weight: bold; border: none; }
        #pos-screen { background: #111; color: #0f0; padding: 20px; border-radius: 10px; font-family: monospace; min-height: 80px; display: flex; align-items: center; justify-content: center; border: 2px solid #444; }
    </style>
</head>
<body>

    <!-- MODALE INIZIO -->
    <div id="modal-start">
        <div class="box-setup">
            <div style="font-size: 50px;">🏪</div>
            <h2>Apertura Cassa</h2>
            <input type="text" id="in-store" placeholder="Nome Negozio" value="MIO MARKET">
            <input type="text" id="in-op" placeholder="Nome Operatore" value="CASSIERE 1">
            <input type="number" id="in-cash" placeholder="Fondo Cassa (€)" value="100">
            <button class="btn btn-pay" onclick="avviaApp()">APRI CASSA</button>
        </div>
    </div>

    <!-- MODALE CONTANTI -->
    <div id="modal-cash" class="pay-modal">
        <div class="pay-content">
            <h2 id="txt-tot-cash">Totale: 0.00 €</h2>
            <input type="number" id="input-ricevuto" placeholder="Importo Ricevuto" style="width:100%; padding:20px; font-size:30px; text-align:center; border:2px solid #ccc; border-radius:10px;">
            <h1 id="txt-resto" style="color:var(--secondary); font-size:40px; margin:20px 0;">Resto: 0.00 €</h1>
            <button class="btn btn-pay" onclick="concludiVendita('CONTANTI')">CHIUDI VENDITA</button>
            <button class="btn" style="background:#555; width:100%; margin-top:10px;" onclick="chiudiModale('modal-cash')">ANNULLA</button>
        </div>
    </div>

    <!-- MODALE SELEZIONE CARTA -->
    <div id="modal-select-card" class="pay-modal">
        <div class="pay-content">
            <h3>Scegli Carta</h3>
            <div class="card-grid">
                <button class="v-card" style="background:#eb001b" onclick="avviaPos('MASTERCARD')">MASTERCARD</button>
                <button class="v-card" style="background:#1a1f71" onclick="avviaPos('VISA')">VISA</button>
                <button class="v-card" style="background:#ffcc00; color:black" onclick="avviaPos('POSTEPAY')">POSTEPAY</button>
                <button class="v-card" style="background:#007bc1" onclick="avviaPos('AMEX')">AMEX</button>
            </div>
            <button class="btn" style="background:#555; width:100%; margin-top:20px;" onclick="chiudiModale('modal-select-card')">ANNULLA</button>
        </div>
    </div>

    <!-- MODALE POS -->
    <div id="modal-pos" class="pay-modal">
        <div class="pay-content" style="background:#222; color:white;">
            <div id="pos-screen">IN ATTESA...</div>
        </div>
    </div>

    <!-- INTERFACCIA PRINCIPALE -->
    <div id="inventory-side">
        <div class="qty-bar">
            <div id="qty-display">1</div>
            <button class="btn-qty" onclick="setQ(1)">1</button>
            <button class="btn-qty" onclick="setQ(2)">2</button>
            <button class="btn-qty" onclick="setQ(5)">5</button>
            <button class="btn-qty" onclick="setQ(10)">10</button>
            <button class="btn-qty" style="background:var(--danger)" onclick="setQ(1)">C</button>
        </div>
        <div class="nav-tabs" id="tabs"></div>
        <div id="grid"></div>
    </div>

    <div id="receipt-side">
        <div id="paper">
            <div class="r-header">
                <div style="font-size:30px">🏪</div>
                <strong id="out-store">NEGOZIO</strong><br>
                VIA ROMA 123, ITALIA<br>
                <div id="out-date">--/--/-- --:--</div>
                <div id="out-op">OP: -</div>
            </div>
            <div class="divider"></div>
            <div id="st-items"></div>
            <div class="divider"></div>
            <div class="r-total">
                <span>TOTALE</span>
                <span id="st-total">0.00 €</span>
            </div>
        </div>
        <button class="btn btn-pay" onclick="apriContanti()">PAGA CONTANTI</button>
        <button class="btn btn-card" onclick="apriSceltaCarta()">PAGA CARTA</button>
        <button class="btn" style="background:#263238; width:100%; margin-top:8px;" onclick="chiusuraZ()">REPORT Z</button>
    </div>

    <script>
        // DATABASE 100 PRODOTTI
        const prodotti = [
            // FRESCHI
            {n:"Pane", p:1.20, i:"🥖", c:"FRESCHI"}, {n:"Latte", p:1.40, i:"🥛", c:"FRESCHI"}, {n:"Uova", p:2.10, i:"🥚", c:"FRESCHI"}, {n:"Burro", p:2.50, i:"🧈", c:"FRESCHI"}, {n:"Formaggio", p:3.50, i:"🧀", c:"FRESCHI"},
            {n:"Mela", p:0.50, i:"🍎", c:"FRESCHI"}, {n:"Banana", p:0.40, i:"🍌", c:"FRESCHI"}, {n:"Pera", p:0.60, i:"🍐", c:"FRESCHI"}, {n:"Arancia", p:0.50, i:"🍊", c:"FRESCHI"}, {n:"Uva", p:2.00, i:"🍇", c:"FRESCHI"},
            {n:"Fragola", p:3.00, i:"🍓", c:"FRESCHI"}, {n:"Anguria", p:4.00, i:"🍉", c:"FRESCHI"}, {n:"Carota", p:0.30, i:"🥕", c:"FRESCHI"}, {n:"Pomodoro", p:0.40, i:"🍅", c:"FRESCHI"}, {n:"Insalata", p:1.00, i:"🥬", c:"FRESCHI"},
            {n:"Pollo", p:6.00, i:"🍗", c:"FRESCHI"}, {n:"Carne", p:8.00, i:"🥩", c:"FRESCHI"}, {n:"Pesce", p:10.0, i:"🐟", c:"FRESCHI"}, {n:"Yogurt", p:0.90, i:"🍦", c:"FRESCHI"}, {n:"Pizza", p:5.00, i:"🍕", c:"FRESCHI"},
            // DISPENSA
            {n:"Pasta", p:0.80, i:"🍝", c:"DISPENSA"}, {n:"Riso", p:2.00, i:"🍚", c:"DISPENSA"}, {n:"Caffè", p:3.50, i:"☕", c:"DISPENSA"}, {n:"Biscotti", p:2.50, i:"🍪", c:"DISPENSA"}, {n:"Cioccolato", p:1.50, i:"🍫", c:"DISPENSA"},
            {n:"Olio Oliva", p:8.00, i:"🫒", c:"DISPENSA"}, {n:"Sale", p:0.50, i:"🧂", c:"DISPENSA"}, {n:"Zucchero", p:1.20, i:"🍬", c:"DISPENSA"}, {n:"Miele", p:5.00, i:"🍯", c:"DISPENSA"}, {n:"Tonno", p:4.00, i:"🍣", c:"DISPENSA"},
            {n:"Patatine", p:1.50, i:"🍟", c:"DISPENSA"}, {n:"Cereali", p:3.00, i:"🥣", c:"DISPENSA"}, {n:"Maionese", p:1.80, i:"🍶", c:"DISPENSA"}, {n:"Ketchup", p:1.50, i:"🥫", c:"DISPENSA"}, {n:"Confettura", p:2.50, i:"🏺", c:"DISPENSA"},
            // BEVANDE
            {n:"Acqua", p:0.40, i:"💧", c:"BEVANDE"}, {n:"Coca Cola", p:1.80, i:"🥤", c:"BEVANDE"}, {n:"Birra", p:1.50, i:"🍺", c:"BEVANDE"}, {n:"Vino", p:5.00, i:"🍷", c:"BEVANDE"}, {n:"Succo", p:1.50, i:"🧃", c:"BEVANDE"},
            {n:"The Limone", p:1.50, i:"🍹", c:"BEVANDE"}, {n:"Aranciata", p:1.60, i:"🥤", c:"BEVANDE"}, {n:"Spumante", p:10.0, i:"🍾", c:"BEVANDE"}, {n:"Energy", p:2.50, i:"⚡", c:"BEVANDE"}, {n:"Soda", p:1.20, i:"🫧", c:"BEVANDE"},
            // MAKEUP
            {n:"Rossetto", p:10.0, i:"💄", c:"MAKEUP"}, {n:"Smalto", p:5.00, i:"💅", c:"MAKEUP"}, {n:"Mascara", p:12.0, i:"👁️", c:"MAKEUP"}, {n:"Cipria", p:15.0, i:"🌫️", c:"MAKEUP"}, {n:"Profumo", p:50.0, i:"💨", c:"MAKEUP"},
            {n:"Palette", p:25.0, i:"🎨", c:"MAKEUP"}, {n:"Pennello", p:8.00, i:"🖌️", c:"MAKEUP"}, {n:"Crema", p:20.0, i:"🧴", c:"MAKEUP"}, {n:"Matita", p:6.00, i:"✏️", c:"MAKEUP"}, {n:"Eyeliner", p:9.00, i:"✒️", c:"MAKEUP"},
            // VESTITI
            {n:"T-Shirt", p:15.0, i:"👕", c:"VESTITI"}, {n:"Jeans", p:40.0, i:"👖", c:"VESTITI"}, {n:"Gonna", p:30.0, i:"👗", c:"VESTITI"}, {n:"Vestito", p:60.0, i:"💃", c:"VESTITI"}, {n:"Felpa", p:35.0, i:"🧥", c:"VESTITI"},
            {n:"Borsa", p:50.0, i:"👜", c:"VESTITI"}, {n:"Scarpe", p:70.0, i:"👟", c:"VESTITI"}, {n:"Cappello", p:20.0, i:"👒", c:"VESTITI"}, {n:"Calzini", p:5.00, i:"🧦", c:"VESTITI"}, {n:"Sciarpa", p:15.0, i:"🧣", c:"VESTITI"},
            // CASA
            {n:"Detersivo", p:5.00, i:"🧼", c:"CASA"}, {n:"Carta Ig.", p:3.00, i:"🧻", c:"CASA"}, {n:"Sapone", p:1.50, i:"🧽", c:"CASA"}, {n:"Shampoo", p:4.00, i:"🧴", c:"CASA"}, {n:"Dentifricio", p:2.50, i:"🪥", c:"CASA"}
        ];

        let carrello = [];
        let qta = 1;
        let cassa = { inizio: 0, vendite: 0 };
        let audioCtx = null;

        // FUNZIONE AVVIA (Corretta per iPad)
        function avviaApp() {
            const store = document.getElementById('in-store').value || "NEGOZIO";
            const op = document.getElementById('in-op').value || "CASSIERE";
            cassa.inizio = parseFloat(document.getElementById('in-cash').value) || 0;

            document.getElementById('out-store').innerText = store.toUpperCase();
            document.getElementById('out-op').innerText = "OP: " + op.toUpperCase();
            
            // Nasconde la schermata di setup
            document.getElementById('modal-start').style.display = 'none';

            // Inizializza Audio al primo tocco
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            generaTab();
            filtra('TUTTI');
            aggiornaOra();
            setInterval(aggiornaOra, 10000);
            
            // Listener per il resto automatico
            document.getElementById('input-ricevuto').addEventListener('input', calcolaResto);
        }

        function generaTab() {
            const cats = ['TUTTI', 'FRESCHI', 'DISPENSA', 'BEVANDE', 'MAKEUP', 'VESTITI', 'CASA'];
            const cont = document.getElementById('tabs');
            cont.innerHTML = cats.map(c => `<button class="tab" onclick="filtra('${c}', this)">${c}</button>`).join('');
            if(cont.children[0]) cont.children[0].classList.add('active');
        }

        function filtra(cat, btn) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            const lista = (cat === 'TUTTI') ? prodotti : prodotti.filter(p => p.c === cat);
            lista.forEach(p => {
                const b = document.createElement('button');
                b.className = "p-card";
                b.onclick = () => aggiungi(p);
                b.innerHTML = `<span class="emoji">${p.i}</span><span class="name">${p.n}</span><span class="price">${p.p.toFixed(2)}€</span>`;
                grid.appendChild(b);
            });
            if(btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        function setQ(n) { qta = n; document.getElementById('qty-display').innerText = n; }

        function aggiungi(p) {
            const es = carrello.find(i => i.n === p.n);
            if(es) es.q += qta; else carrello.push({ n: p.n, p: p.p, q: qta });
            qta = 1; document.getElementById('qty-display').innerText = 1;
            render();
            beep(800, 0.08);
        }

        function render() {
            const cont = document.getElementById('st-items');
            cont.innerHTML = "";
            let tot = 0;
            carrello.forEach(i => {
                let sub = i.p * i.q;
                tot += sub;
                cont.innerHTML += `<div class="r-row"><span>${i.n}</span><span>${sub.toFixed(2)}€</span></div><div class="r-sub">${i.q} x ${i.p.toFixed(2)}</div>`;
            });
            document.getElementById('st-total').innerText = tot.toFixed(2) + " €";
        }

        function apriContanti() {
            const tot = parseFloat(document.getElementById('st-total').innerText);
            if(tot <= 0) return;
            document.getElementById('txt-tot-cash').innerText = "Totale: " + tot.toFixed(2) + " €";
            document.getElementById('modal-cash').style.display = 'flex';
        }

        function calcolaResto() {
            const tot = parseFloat(document.getElementById('st-total').innerText);
            const rice = parseFloat(document.getElementById('input-ricevuto').value) || 0;
            const res = rice - tot;
            document.getElementById('txt-resto').innerText = "Resto: " + (res > 0 ? res.toFixed(2) : "0.00") + " €";
        }

        function apriSceltaCarta() {
            if(parseFloat(document.getElementById('st-total').innerText) <= 0) return;
            document.getElementById('modal-select-card').style.display = 'flex';
        }

        function avviaPos(brand) {
            document.getElementById('modal-select-card').style.display = 'none';
            document.getElementById('modal-pos').style.display = 'flex';
            const screen = document.getElementById('pos-screen');
            screen.innerText = "CONTATTO " + brand + "...";
            setTimeout(() => screen.innerText = "AUTORIZZAZIONE...", 2000);
            setTimeout(() => { 
                screen.innerText = "PAGAMENTO OK!"; 
                beep(1000, 0.1); setTimeout(() => beep(1200, 0.1), 100);
            }, 4000);
            setTimeout(() => { concludiVendita('CARTA'); chiudiModale('modal-pos'); }, 6000);
        }

        function concludiVendita(tipo) {
            const tot = parseFloat(document.getElementById('st-total').innerText);
            cassa.vendite += tot;
            carrello = [];
            render();
            chiudiModale('modal-cash');
            document.getElementById('input-ricevuto').value = "";
            alert("VENDITA CONCLUSA!");
        }

        function chiusuraZ() {
            alert(`REPORT Z\nFondo: €${cassa.inizio}\nVendite: €${cassa.vendite.toFixed(2)}\nTotale: €${(cassa.inizio + cassa.vendite).toFixed(2)}`);
        }

        function chiudiModale(id) { document.getElementById(id).style.display = 'none'; }

        function aggiornaOra() {
            const n = new Date();
            document.getElementById('out-date').innerText = n.toLocaleString();
        }

        function beep(f, d) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.value = 0.05;
            o.start(); o.stop(audioCtx.currentTime + d);
        }
    </script>
</body>
</html>
